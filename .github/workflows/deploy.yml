name: Deploy PHP & React Application

on:
  push:
    branches:
      - main  # Теперь снова деплоим при пуше в main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий из Гитхаба
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настраиваем Node.js для сборки Реакта
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json' # Укажи путь, если папка вложена

      # 3. Устанавливаем зависимости и собираем фронтенд
      - name: Install dependencies and Build Frontend
        run: |
          cd client # Заходим в папку перед сборкой
          npm install
          npm run build

      # 4. Копируем send.php внутрь папки dist перед отправкой
      # Чтобы на хостинг всё улетело одним монолитом
      - name: Prepare build artifacts
        run: cp client/send.php client/dist/send.php

      # 5. Чистим папку на хостинге и заливаем новые файлы
      - name: Deploy to Shared Hosting via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Переходим в папку твоего домена на хостинге
            # ЗАМЕНИ 'public_html' на реальное имя папки твоего домена, если оно другое!
            cd ~/www/sitesnn.ru || cd ~/sitesnn.ru || exit 1
            
            # Чистим старые ассеты, чтобы не копился хлам (кроме файла .env)
            find . -maxdepth 1 ! -name '.env' ! -name '.htaccess' ! -name '.' -exec rm -rf {} +

      # 6. Заливаем готовую сборку (содержимое dist) на хостинг
      - uses: appleboy/scp-action@v0.1.7
        with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            source: "client/dist/*" # УКАЗАЛИ ПРАВИЛЬНЫЙ ПУТЬ ДО ТВОЕЙ ПАПКИ DIST
            target: "~/www/sitesnn.ru" # Твой путь на хостинге
            strip_components: 2